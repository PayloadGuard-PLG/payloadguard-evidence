name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Deliberately no Dafny/Z3 *binary* toolchain install here: the
      # suite reads committed verification captures, it never shells out
      # to a live `dafny`/`crosshair` invocation (confirmed by grepping
      # tests/ and evidence/ for subprocess calls before adding this
      # job — the only subprocess.run() usage in tests/ drives this
      # repo's own `evidence.cli`, not an external verifier). The
      # z3-solver package in requirements.txt is Z3's Python binding,
      # used by evidence/dafny_spec_lint.py's own precondition-
      # satisfiability translator — a different thing from the Dafny
      # verifier binary, and sufficient on its own for every test.
      - name: Run tests
        run: python -m pytest tests/ -q
