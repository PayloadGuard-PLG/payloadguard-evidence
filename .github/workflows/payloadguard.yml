name: PayloadGuard

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: PayloadGuard scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Full history: PayloadGuard diffs head against base internally
          # (git fetch origin <base_ref>:<base_ref>) — a shallow checkout
          # risks that fetch landing on a truncated history.
          fetch-depth: 0

      - name: PayloadGuard
        id: payloadguard
        uses: PayloadGuard-PLG/payload-consequence-analyser@fe6833887f34e77e53cf7e1dcf73c37297f5fea3  # v1.3.0
        with:
          pr-description: ${{ github.event.pull_request.body }}
          # auto-remediate and runtime-mode intentionally left at their
          # safe defaults (false / disabled) — see the comments below
          # before turning either on.

      # auto-remediate: "false" (default) — opts INTO a separate PR that
      # rewrites mutable Action tags to pinned SHAs. Never touches the
      # scanned branch directly, but it does mean granting this workflow
      # `contents: write` (to push that new branch) in addition to
      # `pull-requests: write` above. Turn on deliberately, not by default.
      #
      # runtime-mode: "disabled" (default) — "audit"/"block" download and
      # run a privileged eBPF agent via sudo that can, in block mode,
      # terminate processes matching its policy. Needs a runner with
      # CONFIG_KPROBES/CONFIG_FTRACE, degrades to exit 0 without them.
      # A materially bigger blast radius than the static scan above —
      # leave disabled until that's an explicit decision, not a default.
      #
      # app-id / private-key / installation-id: optional GitHub App
      # wiring for posting a native Check Run instead of (or alongside)
      # the PR comment above. Not configured — no such App exists for
      # this org yet. Add repo secrets and wire them in here if that
      # changes.

      - name: Enforce verdict
        if: always()
        shell: bash
        env:
          EXIT_CODE: ${{ steps.payloadguard.outputs.exit-code }}
          VERDICT: ${{ steps.payloadguard.outputs.verdict }}
        run: |
          echo "PayloadGuard verdict output: ${VERDICT} (exit code ${EXIT_CODE})"
          # Corrected 2026-07-10 after reading analyze.py directly (an
          # earlier version of this comment guessed wrong about exit-code
          # ambiguity -- this is what the tool's own --help epilog and
          # main() actually do):
          #   0  safe, review, OR caution -- none of these block merge
          #   1  analysis error -- the scan itself couldn't complete
          #   2  destructive -- the only verdict the tool itself blocks on
          # The four-way SAFE/REVIEW/CAUTION/DESTRUCTIVE distinction lives
          # in the posted PR comment (the real markdown report), not in
          # this exit code -- read that for the actual finding, this gate
          # only answers "did the scan run clean and non-destructive."
          #
          # One real, minor wrapper quirk, not a gating bug: the
          # composite action's own shell labels steps.payloadguard.outputs.verdict
          # as "SAFE" for ANY exit-0 result, even a true REVIEW/CAUTION
          # internally -- so ${VERDICT} above can under-report. This step
          # gates on ${EXIT_CODE} directly, not on that label, so it isn't
          # affected; noted here so nobody "fixes" this step by trusting
          # ${VERDICT} instead.
          #
          # Blocking on exit 1 (not just 2) is a deliberate choice beyond
          # the tool's own contract: a scan that couldn't complete gets
          # treated as fail-closed here, not as an automatic pass.
          if [ "${EXIT_CODE}" != "0" ]; then
            echo "::error::PayloadGuard exit code ${EXIT_CODE} (0=safe/review/caution, 1=analysis error, 2=destructive) -- blocking merge."
            exit 1
          fi
