# VARIANT A metadata (T4-A) for the drug-drug interaction checker.
# Dafny-only (no crosshair/concrete_test evidence exists for this example -
# see toolchain below and evidence/cli.py's own docstring for how the
# pipeline handles that honestly, not by fabricating bounds data).
# Validated by evidence/schema/metadata.schema.a.json.
device:
  name: DOAC Drug-Drug Interaction Checker (POC)
  intended_use: >
    Check a specific direct oral anticoagulant (DOAC) and concomitant
    agent pairing against a known interactions table, returning an
    outcome/risk-direction classification, plus the specific numeric
    dose-reduction target for the five real cells the source states one
    (REQ-DDI-6) - not a general dose calculator for every DOAC/agent
    pairing, since most cells have no numeric figure to prove at all.
  safety_classification: B
  classification_rationale: >
    DECLARED - not assigned by the NHS SPS source, which classifies
    interaction severity per pairing but does not assign IEC 62304
    classes or ISO 14971 severity/probability scores. Provisional:
    failure could contribute to a missed contraindication or an
    over-cautious restriction, given clinician oversight. Requires a
    manufacturer-specific ISO 14971 risk file before this can be
    upgraded from DECLARED to sourced.
requirements:
  - id: REQ-DDI-1
    text: >
      The checker returns an InteractionResult(outcome, direction) pair,
      never a bare boolean. outcome is one of NoInteractionExpected,
      Caution, CautionLowRelevance, Avoid, Contraindicated,
      DoseReductionAdvised, NotCovered; direction is BleedingRisk,
      ThrombosisRisk, NoRisk, or UnknownRisk - every one of the source's
      17 sections is headed by exactly this distinction.
    implementation: drug_interaction_checker.dfy::CheckInteraction
    intended_method: PROVEN
    evidence:
      - method: dafny
        spec_target: drug_interaction_checker.dfy
        dafny_method: CheckInteraction
  - id: REQ-DDI-2
    text: >
      CheckInteraction(doac, agent, hasOtherBleedingRiskFactors,
      treatmentIndication) is a total, hardcoded pairwise lookup covering
      17 of the source's 17 named sections. No precondition at all as of
      REQ-DDI-5 (2026-07-12) - the four apixaban+{Rifampicin,
      Carbamazepine, Phenytoin, Phenobarbital} cells this function used
      to exclude are now provable for every constructible
      TreatmentIndication value, so the exclusion was removed rather than
      kept as dead code.
    implementation: drug_interaction_checker.dfy::CheckInteraction
    intended_method: PROVEN
    evidence:
      - method: dafny
        spec_target: drug_interaction_checker.dfy
        dafny_method: CheckInteraction
  - id: REQ-DDI-3
    text: >
      SSRIs/SNRIs: dabigatran's dose-reduction advice is conditional on a
      caller-supplied hasOtherBleedingRiskFactors flag - both branches
      proven, not just the one exercised first.
    implementation: drug_interaction_checker.dfy::CheckInteraction
    intended_method: PROVEN
    evidence:
      - method: dafny
        spec_target: drug_interaction_checker.dfy
        dafny_method: CheckInteraction
  - id: REQ-DDI-4
    text: >
      Fail-safe: any (doac, agent) pair not present in the source's
      named set - including within-source gaps like
      apixaban+dronedarone - returns NotCovered, never silently
      NoInteractionExpected.
    implementation: drug_interaction_checker.dfy::CheckInteraction
    intended_method: PROVEN
    evidence:
      - method: dafny
        spec_target: drug_interaction_checker.dfy
        dafny_method: CheckInteraction
  - id: REQ-DDI-5
    text: >
      Rifampicin and carbamazepine/phenytoin/phenobarbital both make
      apixaban's outcome depend on a third axis, clinical indication -
      TreatmentIndication (AFStrokePrevention | RecurrentVTEPrevention |
      OrthopaedicVTEProphylaxis, the third constructor added 2026-07-13
      for REQ-DDI-6's own indication scoping, not apixaban's - see
      REQ-DDI-6 below). Both named indications give apixaban the
      identical "use with caution" outcome, so every constructible input
      is provable - CheckInteraction's precondition (REQ-DDI-2) is
      removed entirely as a result. For the orthopaedic-VTE-prophylaxis
      indication specifically (added for REQ-DDI-6, not sourced for
      apixaban here), all four apixaban+inducer cells return NotCovered
      rather than a fabricated Caution - fixed 2026-07-13 after a code
      review found the original implementation's match arms computed
      Caution unconditionally, without inspecting treatmentIndication at
      all, silently returning an unproven outcome once the third
      constructor made that indication constructible. Matches
      (Apixaban, Dronedarone)'s established silent-cell convention: the
      interaction source never states an apixaban outcome for the
      hip/knee-replacement indication, so NotCovered is the honest
      answer, not a value this function should fabricate.
    implementation: drug_interaction_checker.dfy::CheckInteraction
    intended_method: PROVEN
    evidence:
      - method: dafny
        spec_target: drug_interaction_checker.dfy
        dafny_method: CheckInteraction
  - id: REQ-DDI-6
    text: >
      The DoseReductionAdvised outcome kind is proven by CheckInteraction
      itself; DoseReductionTargetMg proves the specific numeric mg
      figure for the five real cells the source states one for:
      Dabigatran+Verapamil (110mg twice daily), and
      Edoxaban+{Dronedarone, ErythromycinSystemic, Ketoconazole,
      Ciclosporin} (30mg each, sourced individually per row).
      Dabigatran+SSRIOrSNRI is deliberately excluded, permanently, not
      staged for a future v3 - the source gives no mg figure for that
      cell ("as per the Summary of Product Characteristics," no number
      stated on this page). Apixaban never appears in this function's
      precondition at all - a direct, confirmed consequence of
      CheckInteraction never producing DoseReductionAdvised for apixaban
      anywhere in its match arms, not a hand-written exclusion. The
      Dabigatran+Verapamil cell is indication-scoped (added 2026-07-13):
      the source states the 110mg figure applies only for
      AF-stroke-prevention and DVT/PE-prevention-and-treatment, not
      dabigatran's third, real, UK-licensed indication (primary VTE
      prevention after elective hip/knee replacement surgery, confirmed
      via sources/emc-smpc-dabigatran-indications-2025.md) - a genuine
      source-silent cell for that third indication, now provably
      excluded rather than silently unaddressed. The four Edoxaban
      cells stay deliberately indication-free - the source states no
      indication scope for those rows.
    implementation: drug_interaction_checker.dfy::DoseReductionTargetMg
    intended_method: PROVEN
    evidence:
      - method: dafny
        spec_target: drug_interaction_checker.dfy
        dafny_method: DoseReductionTargetMg
toolchain: {}
