# Component F (Tier 3, structural separation): the FROZEN CONTRACT for
# renal_adjustment.dfy - the canonical, AST-normalized contract surface: every
# datatype/codatatype definition, and per function/method its signature +
# requires + ensures, plus function/predicate bodies (which ARE the spec).
# GENERATED by evidence/frozen_contract.py::build_frozen_contract from the
# human-authored spec, then committed and drift-checked - do not hand-edit.
# check_contract proves any candidate .dfy preserves this surface exactly and
# introduces no forbidden soundness escape (assume / {:axiom} / {:extern}).
# method bodies are NOT frozen (implementation, where proof scaffolding lives).
spec: renal_adjustment.dfy
forbidden_constructs:
- assume
- '{:axiom}'
- '{:extern}'
declarations:
- kind: datatype
  name: GStageCategory
  definition: datatype GStageCategory = G1 | G2 | G3a | G3b | G4 | G5
- kind: datatype
  name: Formula
  definition: datatype Formula = EGFRFormula | CockcroftGaultFormula
- kind: datatype
  name: RenalAssessment
  definition: 'datatype RenalAssessment = | EGFRAssessment ( stage : GStageCategory ) | CrClAssessment
    ( roundedCrClMlPerMin : int )'
- kind: function
  name: RoundHalfUp
  signature: 'function RoundHalfUp ( x : real ) : int'
  requires:
  - x >= 0.0
  ensures:
  - ( RoundHalfUp ( x ) as real ) - 0.5 <= x < ( RoundHalfUp ( x ) as real ) + 0.5
  - RoundHalfUp ( x ) >= 0
  body: '{ ( x + 0.5 ) . Floor }'
- kind: function
  name: GStage
  signature: 'function GStage ( roundedEgfr : int ) : GStageCategory'
  requires:
  - roundedEgfr >= 0
  ensures:
  - roundedEgfr >= 90 ==> GStage ( roundedEgfr ) == G1
  - 60 <= roundedEgfr <= 89 ==> GStage ( roundedEgfr ) == G2
  - 45 <= roundedEgfr <= 59 ==> GStage ( roundedEgfr ) == G3a
  - 30 <= roundedEgfr <= 44 ==> GStage ( roundedEgfr ) == G3b
  - 15 <= roundedEgfr <= 29 ==> GStage ( roundedEgfr ) == G4
  - roundedEgfr < 15 ==> GStage ( roundedEgfr ) == G5
  body: '{ if roundedEgfr >= 90 then G1 else if roundedEgfr >= 60 then G2 else if roundedEgfr >= 45 then
    G3a else if roundedEgfr >= 30 then G3b else if roundedEgfr >= 15 then G4 else G5 }'
- kind: function
  name: SelectFormula
  signature: 'function SelectFormula ( isDirectActingOralAnticoagulant : bool , isOnNephrotoxicDrug :
    bool , ageYears : int , bmi : real , isNarrowTherapeuticIndexDrug : bool ) : Formula'
  requires:
  - ageYears >= 0
  - bmi > 0.0
  ensures:
  - ( isDirectActingOralAnticoagulant || isOnNephrotoxicDrug || ageYears >= 75 || bmi < 18.0 || bmi >
    40.0 || isNarrowTherapeuticIndexDrug ) ==> SelectFormula ( isDirectActingOralAnticoagulant , isOnNephrotoxicDrug
    , ageYears , bmi , isNarrowTherapeuticIndexDrug ) == CockcroftGaultFormula
  - '! ( isDirectActingOralAnticoagulant || isOnNephrotoxicDrug || ageYears >= 75 || bmi < 18.0 || bmi
    > 40.0 || isNarrowTherapeuticIndexDrug ) ==> SelectFormula ( isDirectActingOralAnticoagulant , isOnNephrotoxicDrug
    , ageYears , bmi , isNarrowTherapeuticIndexDrug ) == EGFRFormula'
  body: '{ if isDirectActingOralAnticoagulant || isOnNephrotoxicDrug || ageYears >= 75 || bmi < 18.0 ||
    bmi > 40.0 || isNarrowTherapeuticIndexDrug then CockcroftGaultFormula else EGFRFormula }'
- kind: function
  name: ComposedCeiling
  signature: 'function ComposedCeiling ( existingCeiling : real , renalCeiling : real ) : real'
  requires:
  - existingCeiling > 0.0
  - renalCeiling > 0.0
  ensures:
  - ComposedCeiling ( existingCeiling , renalCeiling ) <= existingCeiling
  - ComposedCeiling ( existingCeiling , renalCeiling ) <= renalCeiling
  - ComposedCeiling ( existingCeiling , renalCeiling ) == existingCeiling || ComposedCeiling ( existingCeiling
    , renalCeiling ) == renalCeiling
  - ComposedCeiling ( existingCeiling , renalCeiling ) > 0.0
  body: '{ if renalCeiling < existingCeiling then renalCeiling else existingCeiling }'
- kind: function
  name: AssessRenalFunction
  signature: 'function AssessRenalFunction ( formula : Formula , renalFunctionValue : real ) : RenalAssessment'
  requires:
  - renalFunctionValue >= 0.0
  ensures:
  - formula == EGFRFormula ==> AssessRenalFunction ( formula , renalFunctionValue ) . EGFRAssessment ?
  - formula == CockcroftGaultFormula ==> AssessRenalFunction ( formula , renalFunctionValue ) . CrClAssessment
    ?
  - formula == EGFRFormula ==> AssessRenalFunction ( formula , renalFunctionValue ) == EGFRAssessment
    ( GStage ( RoundHalfUp ( renalFunctionValue ) ) )
  - formula == CockcroftGaultFormula ==> AssessRenalFunction ( formula , renalFunctionValue ) == CrClAssessment
    ( RoundHalfUp ( renalFunctionValue ) )
  body: '{ if formula == EGFRFormula then EGFRAssessment ( GStage ( RoundHalfUp ( renalFunctionValue )
    ) ) else CrClAssessment ( RoundHalfUp ( renalFunctionValue ) ) }'
- kind: function
  name: CockcroftGaultCrClMlPerMin
  signature: 'function CockcroftGaultCrClMlPerMin ( ageYears : int , weightKg : real , isFemale : bool
    , serumCreatinineUmolPerL : real ) : real'
  requires:
  - 0 <= ageYears < 140
  - weightKg > 0.0
  - serumCreatinineUmolPerL > 0.0
  ensures:
  - CockcroftGaultCrClMlPerMin ( ageYears , weightKg , isFemale , serumCreatinineUmolPerL ) > 0.0
  - '! isFemale ==> CockcroftGaultCrClMlPerMin ( ageYears , weightKg , isFemale , serumCreatinineUmolPerL
    ) == ( ( 140 - ageYears ) as real ) * weightKg * 88.4 / ( 72.0 * serumCreatinineUmolPerL )'
  - isFemale ==> CockcroftGaultCrClMlPerMin ( ageYears , weightKg , isFemale , serumCreatinineUmolPerL
    ) == ( ( 140 - ageYears ) as real ) * weightKg * 88.4 / ( 72.0 * serumCreatinineUmolPerL ) * 0.85
  body: '{ var base := ( ( 140 - ageYears ) as real ) * weightKg * 88.4 / ( 72.0 * serumCreatinineUmolPerL
    ) ; if isFemale then base * 0.85 else base }'
- kind: function
  name: AssessRenalFunctionFromInputs
  signature: 'function AssessRenalFunctionFromInputs ( isDirectActingOralAnticoagulant : bool , isOnNephrotoxicDrug
    : bool , ageYears : int , bmi : real , isNarrowTherapeuticIndexDrug : bool , weightKg : real , isFemale
    : bool , serumCreatinineUmolPerL : real , callerSuppliedEgfr : real ) : RenalAssessment'
  requires:
  - 0 <= ageYears < 140
  - bmi > 0.0
  - weightKg > 0.0
  - serumCreatinineUmolPerL > 0.0
  - callerSuppliedEgfr >= 0.0
  ensures:
  - SelectFormula ( isDirectActingOralAnticoagulant , isOnNephrotoxicDrug , ageYears , bmi , isNarrowTherapeuticIndexDrug
    ) == CockcroftGaultFormula ==> AssessRenalFunctionFromInputs ( isDirectActingOralAnticoagulant , isOnNephrotoxicDrug
    , ageYears , bmi , isNarrowTherapeuticIndexDrug , weightKg , isFemale , serumCreatinineUmolPerL ,
    callerSuppliedEgfr ) == AssessRenalFunction ( CockcroftGaultFormula , CockcroftGaultCrClMlPerMin (
    ageYears , weightKg , isFemale , serumCreatinineUmolPerL ) )
  - SelectFormula ( isDirectActingOralAnticoagulant , isOnNephrotoxicDrug , ageYears , bmi , isNarrowTherapeuticIndexDrug
    ) == EGFRFormula ==> AssessRenalFunctionFromInputs ( isDirectActingOralAnticoagulant , isOnNephrotoxicDrug
    , ageYears , bmi , isNarrowTherapeuticIndexDrug , weightKg , isFemale , serumCreatinineUmolPerL ,
    callerSuppliedEgfr ) == AssessRenalFunction ( EGFRFormula , callerSuppliedEgfr )
  body: '{ var formula := SelectFormula ( isDirectActingOralAnticoagulant , isOnNephrotoxicDrug , ageYears
    , bmi , isNarrowTherapeuticIndexDrug ) ; if formula == CockcroftGaultFormula then AssessRenalFunction
    ( formula , CockcroftGaultCrClMlPerMin ( ageYears , weightKg , isFemale , serumCreatinineUmolPerL
    ) ) else AssessRenalFunction ( formula , callerSuppliedEgfr ) }'
