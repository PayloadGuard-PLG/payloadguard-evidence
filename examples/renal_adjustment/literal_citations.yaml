  # --- Cockcroft-Gault formula constants (CockcroftGaultCrClMlPerMin) ---
  "140":
    kind: source
    source: ckd-epi-2021-and-cockcroft-gault-verification.md
    quote: "CrCl (men) = (140 − age) × weight(kg) / (72 × Scr[mg/dL])"
  "72.0":
    kind: source
    source: ckd-epi-2021-and-cockcroft-gault-verification.md
    quote: "CrCl (men) = (140 − age) × weight(kg) / (72 × Scr[mg/dL])"
  "0.85":
    kind: source
    source: ckd-epi-2021-and-cockcroft-gault-verification.md
    quote: "CrCl (women) = above × 0.85"
  "88.4":
    kind: source
    source: ckd-epi-2021-and-cockcroft-gault-verification.md
    quote: "(88.4) is standard clinical chemistry"

  # --- author-chosen value the source does NOT state ---
  "0.5":
    kind: design_decision
    note: >-
      Round-half-up tie-break (89.5 -> 90). The rounding-to-whole-number
      requirement is KDIGO-sourced, but this specific tie-break is NOT a KDIGO
      rule - KDIGO states no tie-breaking method, and NKF implementation
      guidance (Miller et al., Clin Chem 2022) defers it to the lab information
      system. A named, uncited design decision, never presented as source-derived.

  # --- mathematical/boundary constants that transcribe no requirement ---
  "0.0":
    kind: structural
    note: >-
      Non-negativity / positivity domain boundaries (x >= 0.0, bmi > 0.0,
      weightKg > 0.0, serumCreatinine > 0.0, ceiling > 0.0, callerSuppliedEgfr
      >= 0.0). A mathematical domain constant, not a transcribed source value.
  "0":
    kind: structural
    note: >-
      Integer zero: non-negativity lower bounds (ageYears >= 0, roundedEgfr >= 0)
      and the RoundHalfUp result-positivity guarantee (RoundHalfUp(x) >= 0).
      A mathematical constant, not source-transcribed.
