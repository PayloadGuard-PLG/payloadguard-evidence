# VARIANT C metadata (T4-C). Content identical to metadata.yaml (the base
# one-record shape is preserved end-to-end); concrete evidence binds at
# generation time via the requirement_id in concrete_results.json cases.
# Validated by evidence/schema/metadata.schema.c.json.
# Sourced from: Arney, Jetley, Jones, Lee, Ray, Sokolsky, Zhang (2009).
# "Generic Infusion Pump Hazard Analysis and Safety Requirements v1.0."
# University of Pennsylvania / FDA OSEL / Fraunhofer CESE, Feb 2009.
# HID = Hazard ID (source Sec 2.4.1). SR = Safety Requirement (source Sec 3).
# Dots in source numbering (e.g. "1.4.12") become hyphens in IDs below to
# satisfy the metadata schema's ^REQ-[A-Z0-9-]+$ pattern.
# Fields omitted below are intentional GAPs (claims discipline): absence is
# the gap signal the binder checks for, not a placeholder string.
# ALARM CONDITION / ALARM SIGNAL terminology below follows IEC 60601-1-8,
# the collateral standard for alarm systems in medical electrical
# equipment (infusion pumps are a named example device class under it).

device:
  name: "Generic Infusion Pump - Dose-Limit Safety Kernel (POC)"
  intended_use: >
    Compute a safe hourly infusion dose from patient and drug parameters,
    clamped so it never exceeds a configured maximum safe dose.
  safety_classification: "B"
  classification_rationale: >
    DECLARED - not assigned by GIP v1.0, which identifies hazards and
    requirements but does not assign IEC 62304 classes or ISO 14971
    severity/probability scores per hazard. Provisional: failure could
    contribute to a non-serious over- or under-dose given clinician
    oversight. Requires a manufacturer-specific ISO 14971 risk file
    before this can be upgraded from DECLARED to sourced.
  # iso14971_risk_file omitted - GAP, not established in source material

requirements:
  - id: "REQ-GIP-1-4-12"
    text: >
      Bolus request exceeding the maximum permissible dose limit shall
      trigger a Dose limit exceeded alarm. (GIP v1.0 Safety Requirement
      1.4.12: "If a bolus request causes the bolus dose to exceed the
      maximum permissible limit, the pump shall issue a Dose limit
      exceeded alarm.")
    kernel_scope: >
      [VERIFIED AT THIS PHASE - ALARM CONDITION per IEC 60601-1-8] The
      kernel shall detect when a bolus request would cause the computed
      hourly dose to exceed max_safe_dose_mg_per_hr, and shall return
      that condition to the calling layer via a clamped output value.
      This is the ALARM CONDITION half of IEC 60601-1-8's alarm-system
      definition ("parts of equipment that detect alarm conditions and,
      as appropriate, generate alarm signals") - detection only, no
      signal generation. The GIP source table itself treats "Alarm()" as
      an abstract response function attached to hazards, not a mandate
      that every hazard-adjacent component emit the physical signal.
    system_scope: >
      [DEFERRED TO INTEGRATION PHASE - ALARM SIGNAL per IEC 60601-1-8]
      The full infusion pump system shall generate an audible or visual
      Dose limit exceeded alarm signal when the kernel reports the
      condition above. Out of scope for kernel unit verification; belongs
      to integration testing against a real device/UI layer, per
      IEC 60601-1-8's alarm-system requirements (priority classification,
      tone/pattern, usability per IEC 62366-1).
    implementation: "dosage.py::calculate_hourly_dose"
    intended_method: "PROVEN"
    # 2026-07-05 Option B amendment: dual-scope split (kernel_scope /
    # system_scope) replacing a single intended_method claim that the
    # prior concrete test did not actually verify - see
    # sources/req-gip-1-4-12-alarm-scope-decision.md.
    # 2026-07-06 (Gate 4 option 3): top-down declaration added for
    # CROSS-CHECKING ONLY against concrete_results.json's self-declared
    # requirement_id - binding itself stays evidence-store-carried,
    # unchanged (evidence/conflict.py, Type 1).
    # 2026-07-07 (Gate 2/C2-C4 wiring): dafny evidence declared -
    # PROVEN is now REALIZED, not just intended, for the kernel_scope
    # half only (system_scope stays a named, deferred GAP - a Dafny
    # proof of the kernel's detection logic says nothing about whether
    # an integrated system actually raises the audible/visual alarm).
    evidence:
      - method: crosshair
      - method: concrete_test
        test_id: kernel_detects_bolus_limit_exceeded
      - method: dafny
        spec_target: "dosage.dfy"
        dafny_method: "CalculateHourlyDose"

  - id: "REQ-GIP-1-8-1"
    text: >
      During normal use and/or single fault condition of the equipment,
      continuous reverse delivery shall not be possible. Modelled at
      this kernel as a fault input: a negative infusion rate (hardware
      reverse-flow fault) shall yield exactly zero delivered dose. (GIP
      v1.0 Safety Requirement 1.8.1, citing IEC 601-2-24; fault
      modelling added in the 2026-07-04 Option A amendment; wording
      corrected 2026-07-15 to match the primary PDF verbatim, see
      sources/README.md)
    implementation: "dosage.py::calculate_hourly_dose"
    intended_method: "PROVEN"
    # 2026-07-07 (Gate 2/C2-C4 wiring): dafny evidence declared - see
    # REQ-GIP-1-4-12's note above for the same rationale.
    evidence:
      - method: crosshair
      - method: concrete_test
        test_id: ordinary_negative_rate_clamps_to_zero
      - method: concrete_test
        test_id: overflow_negative_rate_clamps_to_zero
      - method: dafny
        spec_target: "dosage.dfy"
        dafny_method: "CalculateHourlyDose"

  - id: "REQ-DOSE-003"
    text: >
      Calculation shall yield a finite, in-range result for all inputs
      meeting preconditions. DECLARED - not sourced from GIP v1.0, which
      does not address floating-point overflow at the implementation
      level.
    implementation: "dosage.py::calculate_hourly_dose"
    intended_method: "BOUNDED_CHECKED"
    evidence:
      - method: crosshair
      - method: concrete_test
        test_id: normal_in_range_exact_value

threat_model:
  - id: "THR-GIP-1-2"
    threat: >
      Overinfusion: dose limit exceeded due to too many bolus requests.
      (GIP v1.0 Hazard 1.2, pump type: All)
    asset: "Dose output value"
    mitigation_ref: "REQ-GIP-1-4-12"
    method: "STRIDE:Tampering"

  - id: "THR-GIP-1-3"
    threat: >
      Overinfusion: programmed bolus volume or concentration too high.
      (GIP v1.0 Hazard 1.3, pump type: All)
    asset: "Dose output value"
    mitigation_ref: "REQ-GIP-1-4-12"
    method: "STRIDE:Tampering"

  - id: "THR-GIP-1-14"
    threat: >
      Improper flow: bleed back / reflux within the device. (GIP v1.0
      Hazard 1.14, pump type: FRN - a source-defined pump subtype not
      decoded in the extracted text; applies to that subtype, not the
      "All" category. See sources/README.md open question.)
    asset: "Dose output value"
    mitigation_ref: "REQ-GIP-1-8-1"
    method: "STRIDE:Tampering"

sbom:
  primary_format: "CycloneDX"
  generator: "syft"
  components_source: "build"

toolchain:
  crosshair_bounds:
    per_condition_timeout_s: 30
    max_iterations: 100000
    seed: 1
