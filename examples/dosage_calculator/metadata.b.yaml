# VARIANT B metadata (T4-B). Derived from metadata.yaml: identical base
# requirements, plus one shadow pseudo-requirement per concrete run in
# concrete_results.json. Each shadow carries an explicit parent_requirement
# field. Validated by evidence/schema/metadata.schema.b.json.
device:
  name: Generic Infusion Pump - Dose-Limit Safety Kernel (POC)
  intended_use: 'Compute a safe hourly infusion dose from patient and drug parameters,
    clamped so it never exceeds a configured maximum safe dose.

    '
  safety_classification: B
  classification_rationale: 'DECLARED - not assigned by GIP v1.0, which identifies
    hazards and requirements but does not assign IEC 62304 classes or ISO 14971
    severity/probability scores per hazard. Provisional: failure could contribute
    to a non-serious over- or under-dose given clinician oversight. Requires a
    manufacturer-specific ISO 14971 risk file before this can be upgraded from
    DECLARED to sourced.

    '
requirements:
- id: REQ-GIP-1-4-12
  text: 'Bolus request exceeding the maximum permissible dose limit shall trigger
    a Dose limit exceeded alarm. (GIP v1.0 Safety Requirement 1.4.12)

    '
  implementation: dosage.py::calculate_hourly_dose
  intended_method: PROVEN
- id: REQ-GIP-1-8-1
  text: 'Continuous reverse delivery shall not be possible during normal use or
    a single-fault condition. Modelled at this kernel as a fault input: a negative
    infusion rate (hardware reverse-flow fault) shall yield exactly zero delivered
    dose. (GIP v1.0 Safety Requirement 1.8.1, citing IEC 601-2-24; fault modelling
    added in the 2026-07-04 Option A amendment)

    '
  implementation: dosage.py::calculate_hourly_dose
  intended_method: PROVEN
- id: REQ-DOSE-003
  text: 'Calculation shall yield a finite, in-range result for all inputs meeting
    preconditions. DECLARED - not sourced from GIP v1.0, which does not address
    floating-point overflow at the implementation level.

    '
  implementation: dosage.py::calculate_hourly_dose
  intended_method: BOUNDED_CHECKED
- id: REQ-GIP-1-8-1.concrete-1
  parent_requirement: REQ-GIP-1-8-1
  text: 'Concrete evidence for REQ-GIP-1-8-1: test ''ordinary_negative_rate_clamps_to_zero''
    - inputs {''weight_kg'': 70.0, ''concentration_mg_per_ml'': 2.0, ''infusion_rate_ml_per_hr'':
    -5.0, ''max_safe_dose_mg_per_hr'': 10.0} shall yield exactly 0.0. (Shadow
    pseudo-requirement, T4-B; evidence recorded in concrete_results.json.)'
  implementation: tests/test_dosage_concrete.py::ordinary_negative_rate_clamps_to_zero
  intended_method: EXAMPLE_CHECKED
- id: REQ-GIP-1-8-1.concrete-2
  parent_requirement: REQ-GIP-1-8-1
  text: 'Concrete evidence for REQ-GIP-1-8-1: test ''overflow_negative_rate_clamps_to_zero''
    - inputs {''weight_kg'': 70.0, ''concentration_mg_per_ml'': 1e+308, ''infusion_rate_ml_per_hr'':
    -2.0, ''max_safe_dose_mg_per_hr'': 10.0} shall yield exactly 0.0. (Shadow
    pseudo-requirement, T4-B; evidence recorded in concrete_results.json.)'
  implementation: tests/test_dosage_concrete.py::overflow_negative_rate_clamps_to_zero
  intended_method: EXAMPLE_CHECKED
- id: REQ-DOSE-003.concrete-1
  parent_requirement: REQ-DOSE-003
  text: 'Concrete evidence for REQ-DOSE-003: test ''normal_in_range_exact_value''
    - inputs {''weight_kg'': 70.0, ''concentration_mg_per_ml'': 2.0, ''infusion_rate_ml_per_hr'':
    3.0, ''max_safe_dose_mg_per_hr'': 10.0} shall yield exactly 6.0. (Shadow pseudo-requirement,
    T4-B; evidence recorded in concrete_results.json.)'
  implementation: tests/test_dosage_concrete.py::normal_in_range_exact_value
  intended_method: EXAMPLE_CHECKED
- id: REQ-GIP-1-4-12.concrete-1
  parent_requirement: REQ-GIP-1-4-12
  text: 'Concrete evidence for REQ-GIP-1-4-12: test ''over_max_clamps_exactly_to_max''
    - inputs {''weight_kg'': 70.0, ''concentration_mg_per_ml'': 2.0, ''infusion_rate_ml_per_hr'':
    500.0, ''max_safe_dose_mg_per_hr'': 10.0} shall yield exactly 10.0. (Shadow
    pseudo-requirement, T4-B; evidence recorded in concrete_results.json.)'
  implementation: tests/test_dosage_concrete.py::over_max_clamps_exactly_to_max
  intended_method: EXAMPLE_CHECKED
threat_model:
- id: THR-GIP-1-2
  threat: 'Overinfusion: dose limit exceeded due to too many bolus requests. (GIP
    v1.0 Hazard 1.2, pump type: All)

    '
  asset: Dose output value
  mitigation_ref: REQ-GIP-1-4-12
  method: STRIDE:Tampering
- id: THR-GIP-1-3
  threat: 'Overinfusion: programmed bolus volume or concentration too high. (GIP
    v1.0 Hazard 1.3, pump type: All)

    '
  asset: Dose output value
  mitigation_ref: REQ-GIP-1-4-12
  method: STRIDE:Tampering
- id: THR-GIP-1-14
  threat: 'Improper flow: bleed back / reflux within the device. (GIP v1.0 Hazard
    1.14, pump type: FRN - a source-defined pump subtype not decoded in the extracted
    text; applies to that subtype, not the "All" category. See sources/README.md
    open question.)

    '
  asset: Dose output value
  mitigation_ref: REQ-GIP-1-8-1
  method: STRIDE:Tampering
sbom:
  primary_format: CycloneDX
  generator: syft
  components_source: build
toolchain:
  crosshair_bounds:
    per_condition_timeout_s: 30
    max_iterations: 100000
    seed: 1
